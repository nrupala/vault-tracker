<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Core v2.0 Mockup</title>
    <style>
        :root { --p: #10b981; --bg: #0a0a0a; --fg: #fafafa; }
        body { background: var(--bg); color: var(--fg); font-family: system-ui; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #333; padding: 2rem; rounded: 1rem; max-width: 400px; text-align: center; }
        button { background: var(--p); color: black; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; }
        pre { background: #1a1a1a; padding: 1rem; border-radius: 0.5rem; text-align: left; font-size: 0.8rem; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Sovereign Core v2.0</h2>
        <p>Zero-Dependency / Buildless / Concrete</p>
        <button id="testBtn">Test AES-GCM Crypto</button>
        <pre id="output">Output will appear here...</pre>
    </div>

    <script type="module">
        import { deriveSovereignKey, createHollowVessel } from './core/crypto.js';

        async function testCrypto() {
            const out = document.getElementById('output');
            out.textContent = "Creating Hollow Vessels...";

            try {
                const password = "sovereign-password";
                const salt = crypto.getRandomValues(new Uint8Array(16));
                const aesKey = await deriveSovereignKey(password, salt);

                // Create two independent "Hollow Vessels"
                const vessel1 = await createHollowVessel(aesKey, "task", { title: "Buy Milk" }, ["grocery"]);
                const vessel2 = await createHollowVessel(aesKey, "note", { content: "Draft Vision" }, ["v2"]);

                out.textContent = "🛡️ Success: 2 Atomic Vessels Created!\n\n" + 
                    "Vessel 1 (Task) Ciphertext:\n" + 
                    Array.from(new Uint8Array(vessel1.ciphertext).slice(0, 16)).map(b => b.toString(16)).join('') + "...\n\n" +
                    "Vessel 2 (Note) Ciphertext:\n" + 
                    Array.from(new Uint8Array(vessel2.ciphertext).slice(0, 16)).map(b => b.toString(16)).join('') + "...\n\n" +
                    "Observation: Both look like random bytes to outsiders. Metadata is 100% hidden inside the vessels.";
            } catch (e) {
                out.textContent = "Error: " + e.message;
            }
        }

        document.getElementById('testBtn').onclick = testCrypto;
    </script>
</body>
</html>
