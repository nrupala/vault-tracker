<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault v2.0 - Grand Shell</title>
    <link rel="stylesheet" href="ui/theme.css">
    <style>
        .layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
        .app-view { min-height: 600px; }
    </style>
</head>
<body>
    <sovereign-app-shell>
        <div slot="content" class="layout">
            <!-- Main Application View -->
            <div class="app-view">
                <section class="glass" style="padding: 2.5rem; height: 100%; box-sizing: border-box;">
                    <h1 style="margin-bottom: 0.5rem;">Sovereign Tasks <sup>ALFA</sup></h1>
                    <div class="hollow-stat" style="margin-bottom: 2rem;">Atomic Encryption Active</div>
                    
                    <div style="margin-bottom: 2rem;">
                        <input type="text" id="taskInput" placeholder="Enter Task..." style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 1.5rem; border-radius: 1.5rem; font-size: 1.2rem; width: 100%; box-sizing: border-box; color: white;">
                    </div>

                    <button id="addBtn" class="btn-primary">Seal into Vessel</button>
                    
                    <div style="margin-top: 3rem;">
                        <h3>Active Hollow Ledger</h3>
                        <sovereign-vessel-list id="vesselList"></sovereign-vessel-list>
                    </div>
                </section>
            </div>

            <!-- Side Intelligence Bar -->
            <aside style="display: grid; gap: 1.5rem; align-content: start;">
                <sovereign-companion-hud id="companion"></sovereign-companion-hud>
                
                <section class="glass" style="padding: 1.5rem; font-size: 0.8rem; border-color: #3b82f633;">
                    <h4 style="color: #3b82f6; margin-top: 0;">🌐 SECURE BROWSER</h4>
                    <p style="opacity: 0.6;">Isolated research container simulator.</p>
                    <button class="btn-primary" style="background: #3b82f6; padding: 0.5rem; font-size: 0.7rem; width: 100%; color: white;">Open Proxy View</button>
                </section>
            </aside>
        </div>
    </sovereign-app-shell>

    <!-- Buildless ESM Integration -->
    <script type="module" src="ui/SovereignAppShell.js"></script>
    <script type="module" src="ui/SovereignCompanionHUD.js"></script>
    <script type="module" src="ui/SovereignVesselList.js"></script>

    <script type="module">
        import { deriveSovereignKey, createHollowVessel } from './core/crypto.js';
        import { initSovereignDB, saveVessel } from './core/db.js';

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const companion = document.getElementById('companion');

        // Initialize Global Core
        initSovereignDB().then(() => console.log("Sovereign SQLite Ready."));

        // Handle External Actions from Companion
        window.addEventListener('sovereign-action', async (e) => {
            const { type, title } = e.detail;
            if (type === 'CREATE_TASK') {
                taskInput.value = title;
                addBtn.click();
            }
        });

        addBtn.onclick = async () => {
            const val = taskInput.value.trim();
            if(!val) return;
            
            try {
                const key = await deriveSovereignKey("user-pass", new Uint8Array(16));
                const vessel = await createHollowVessel(key, "task", { title: val, status: 'pending' });
                const id = `task_${crypto.randomUUID()}`;
                
                await saveVessel(id, vessel.ciphertext, vessel.iv);
                taskInput.value = "";
                
                // Signal refresh
                window.dispatchEvent(new CustomEvent('sovereign-vessel-added'));
                console.log("Vessel Sealed.");
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
