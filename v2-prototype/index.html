<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault v2.0 - Grand Shell</title>
    <link rel="stylesheet" href="ui/theme.css">
    <style>
        .layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
        .app-view { min-height: 600px; }
    </style>
</head>
<body>
    <sovereign-app-shell>
        <div slot="content" class="layout">
            <!-- Main Application View -->
            <div class="app-view">
                <sovereign-router id="router">
                    <!-- Tasks Module -->
                    <section slot="tasks" class="glass" style="padding: 2.5rem; height: 100%; box-sizing: border-box;">
                        <h1 style="margin-bottom: 0.5rem;">Sovereign Tasks <sup>ALFA</sup></h1>
                        <div class="hollow-stat" style="margin-bottom: 2rem;">Atomic Encryption Active</div>
                        
                        <div style="margin-bottom: 2rem;">
                            <input type="text" id="taskInput" placeholder="Enter Task..." style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 1.5rem; border-radius: 1.5rem; font-size: 1.2rem; width: 100%; box-sizing: border-box; color: white;">
                        </div>
                        <button id="addBtn" class="btn-primary">Seal into Vessel</button>
                        
                        <div style="margin-top: 3rem;">
                            <h3>Active Hollow Ledger</h3>
                            <sovereign-vessel-list id="vesselList"></sovereign-vessel-list>
                        </div>
                    </section>

                    <!-- Notes Module -->
                    <section slot="notes" class="glass" style="padding: 2.5rem; height: 100%; box-sizing: border-box;">
                        <h1 style="margin-bottom: 0.5rem;">Sovereign Notes <sup>ALFA</sup></h1>
                        <div class="hollow-stat" style="margin-bottom: 2rem;">Zero-Persistence Journaling</div>
                        <textarea id="noteInput" placeholder="Write deep thoughts..." style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 1.5rem; border-radius: 1.5rem; font-size: 1.1rem; width: 100%; height: 200px; box-sizing: border-box; color: white; margin-bottom: 1rem;"></textarea>
                        <button id="saveNoteBtn" class="btn-primary">Vault the Note</button>
                    </section>

                    <!-- Habits Module -->
                    <section slot="habits" class="glass" style="padding: 2.5rem; height: 100%; box-sizing: border-box;">
                        <h1 style="margin-bottom: 0.5rem;">Sovereign Habits <sup>ALFA</sup></h1>
                        <div class="hollow-stat" style="margin-bottom: 2rem;">Consistency through Sovereignty</div>
                        <input type="text" id="habitInput" placeholder="New Habit (e.g. Meditate)..." style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 1.5rem; border-radius: 1.5rem; font-size: 1.2rem; width: 100%; box-sizing: border-box; color: white; margin-bottom: 1rem;">
                        <button id="addHabitBtn" class="btn-primary">Initiate Habit Vessel</button>
                    </section>

                    <!-- Ledger Module -->
                    <section slot="ledger" class="glass" style="padding: 2.5rem; height: 100%; box-sizing: border-box;">
                        <h1 style="margin-bottom: 0.5rem;">Sovereign Ledger <sup>ALFA</sup></h1>
                        <div class="hollow-stat" style="margin-bottom: 2rem;">Private Financial Footprint</div>
                        <div style="display: grid; grid-template-columns: 1fr 120px; gap: 1rem; margin-bottom: 1rem;">
                            <input type="text" id="ledgerDesc" placeholder="Description..." style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 1rem; border-radius: 1rem; color: white;">
                            <input type="number" id="ledgerAmount" placeholder="0.00" style="background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 1rem; border-radius: 1rem; color: white;">
                        </div>
                        <button id="addLedgerBtn" class="btn-primary">Seal Transaction</button>
                    </section>
                </sovereign-router>
            </div>

            <!-- Side Intelligence Bar -->
            <aside style="display: grid; gap: 1.5rem; align-content: start;">
                <sovereign-companion-hud id="companion"></sovereign-companion-hud>
                
                <section class="glass" style="padding: 1.5rem; font-size: 0.8rem; border-color: #3b82f633;">
                    <h4 style="color: #3b82f6; margin-top: 0;">🌐 SECURE BROWSER</h4>
                    <p style="opacity: 0.6;">Isolated research container simulator.</p>
                    <button class="btn-primary" style="background: #3b82f6; padding: 0.5rem; font-size: 0.7rem; width: 100%; color: white;">Open Proxy View</button>
                </section>
            </aside>
        </div>
    </sovereign-app-shell>

    <script type="module" src="ui/SovereignAppShell.js"></script>
    <script type="module" src="ui/SovereignCompanionHUD.js"></script>
    <script type="module" src="ui/SovereignVesselList.js"></script>
    <script type="module" src="ui/SovereignRouter.js"></script>

    <script type="module">
        import { deriveSovereignKey, createHollowVessel } from './core/crypto.js';
        import { initSovereignDB, saveVessel } from './core/db.js';

        const taskInput = document.getElementById('taskInput');
        const noteInput = document.getElementById('noteInput');
        const habitInput = document.getElementById('habitInput');
        const ledgerDesc = document.getElementById('ledgerDesc');
        const ledgerAmount = document.getElementById('ledgerAmount');

        const addBtn = document.getElementById('addBtn');
        const saveNoteBtn = document.getElementById('saveNoteBtn');
        const addHabitBtn = document.getElementById('addHabitBtn');
        const addLedgerBtn = document.getElementById('addLedgerBtn');

        // ... existing nav logic ...

        // Unified Vessel Sealing Function
        async function sealVessel(type, data) {
            try {
                const key = await deriveSovereignKey("user-pass", new Uint8Array(16));
                const vessel = await createHollowVessel(key, type, data);
                const id = `${type}_${crypto.randomUUID()}`;
                
                await saveVessel(id, vessel.ciphertext, vessel.iv);
                
                // Signal refresh
                window.dispatchEvent(new CustomEvent('sovereign-vessel-added'));
                console.log(`Vessel [${type}] Sealed.`);
            } catch (e) {
                console.error(e);
            }
        }

        addBtn.onclick = () => {
            sealVessel('task', { title: taskInput.value });
            taskInput.value = "";
        };

        saveNoteBtn.onclick = () => {
            sealVessel('note', { content: noteInput.value });
            noteInput.value = "";
        };

        addHabitBtn.onclick = () => {
            sealVessel('habit', { title: habitInput.value, streak: 0 });
            habitInput.value = "";
        };

        addLedgerBtn.onclick = () => {
            sealVessel('ledger', { desc: ledgerDesc.value, amount: ledgerAmount.value });
            ledgerDesc.value = "";
            ledgerAmount.value = "";
        };
    </script>
</body>
</html>
