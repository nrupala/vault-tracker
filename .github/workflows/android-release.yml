name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Build Vault Ecosystem
        run: pnpm build

      - name: Sync Capacitor Android
        run: |
          cd apps/vault-tracker
          npx cap sync android

      - name: Sync Version to Android
        run: |
          VERSION=$(node -p "require('./apps/vault-tracker/package.json').version")
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" apps/vault-tracker/android/app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"$VERSION\"/" apps/vault-tracker/android/app/build.gradle
          echo "Synced Version: $VERSION ($VERSION_CODE)"

      - name: Build Android APK
        run: |
          cd apps/vault-tracker/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vault-tracker-debug
          path: apps/vault-tracker/android/app/build/outputs/apk/debug/app-debug.apk
